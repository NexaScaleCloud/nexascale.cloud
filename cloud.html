<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cloud Platforms & Services</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/style.css">

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<header class="navbar">
  <div class="logo" onclick="location.href='index.html'">
    NexaScale
  </div>
  <nav class="menu">
    <a href="index.html">Home</a>
    <a href="microsoft365.html">Microsoft 365</a>
    <a href="#">Plans</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- MAIN CONTAINER -->
<section class="m365-container">

  <!-- HEADER -->
  <div class="page-header">
    <h1 class="page-title">Cloud Platforms & Services</h1>
    <p class="page-subtitle">
      Azure, AWS, Google Cloud & Workspace Solutions
    </p>
  </div>

  <!-- GRID -->
  <div class="m365-grid">

    <div class="m365-card" onclick="showCloudService(event, 'azure')">
      Microsoft Azure

    <div class="m365-card" onclick="showCloudService(event, 'aws')">
      Amazon Web Services

    <div class="m365-card" onclick="showCloudService(event, 'gcp')">
      Google Cloud Platform
    </div>

    <div class="m365-card" onclick="showCloudService(event, 'workspace')">
      Google Workspace
    </div>

  </div>

  <!-- DETAILS -->
  <div id="cloud-details" class="m365-details"></div>

  <!-- BACK BUTTON -->
  <div class="back-container">
    <button class="back-btn" onclick="location.href='index.html'">
      ⬅ Back to Home

<script src="js/cloud.js"></script>
