<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NexaScale</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">NexaScale</div>
    <div class="menu">
        <a href="#services">Services</a>
        <a href="#solutions">Solutions</a>
        <a href="#contact">Contact</a>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <h1>
        Build the Future on<br>
        <span>Cloud Infrastructure</span>
    </h1>
    <p>Azure • AWS • Google Cloud Solutions</p>
    <a href="#contact" class="btn">Get Started</a>
</section>

<!-- SERVICES -->
<section id="services" class="section">
    <h2>Services</h2>
    <div class="grid">
        <div class="card fade">Microsoft 365</div>
        <div class="card fade">Azure</div>
        <div class="card fade">AWS</div>
        <div class="card fade">Google Cloud</div>
    </div>
</section>

<!-- SOLUTIONS -->
<section id="solutions" class="section">
    <h2>Solutions</h2>
    <div class="grid">
        <div class="card fade">Migration</div>
        <div class="card fade">Security</div>
        <div class="card fade">Optimization</div>
        <div class="card fade">Automation</div>
    </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
    <h2>Contact</h2>
    <p>info@nexascale.cloud</p>
</section>

<footer>
    © 2026 NexaScale
</footer>

<script src="script.js"></script>

</body>
</html>
